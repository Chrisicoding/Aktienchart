<!DOCTYPE html>
<html lang="de">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>MÄRKTE · Live Dashboard</title>
<link href="https://fonts.googleapis.com/css2?family=Space+Mono:wght@400;700&family=Syne:wght@700;800&display=swap" rel="stylesheet">
<script src="https://cdnjs.cloudflare.com/ajax/libs/lightweight-charts/4.1.3/lightweight-charts.standalone.production.js"></script>
<style>
:root {
  --bg: #07090d;
  --s1: #0c1018;
  --s2: #111720;
  --border: #1a2535;
  --accent: #00d4ff;
  --green: #00e676;
  --red: #ff1744;
  --muted: #3d5268;
  --text: #b8cdd8;
  --dim: #506070;
  --glow-b: 0 0 24px rgba(0,212,255,0.12);
  --glow-g: 0 0 24px rgba(0,230,118,0.12);
  --glow-r: 0 0 24px rgba(255,23,68,0.12);
}
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

body {
  background: var(--bg);
  color: var(--text);
  font-family: 'Space Mono', monospace;
  min-height: 100vh;
  overflow-x: hidden;
}
body::before {
  content: '';
  position: fixed; inset: 0;
  background-image:
    linear-gradient(rgba(0,212,255,0.025) 1px, transparent 1px),
    linear-gradient(90deg, rgba(0,212,255,0.025) 1px, transparent 1px);
  background-size: 48px 48px;
  pointer-events: none; z-index: 0;
}
.z1 { position: relative; z-index: 1; }

/* ── HEADER ── */
header {
  display: flex; align-items: center; justify-content: space-between;
  padding: 18px 36px;
  border-bottom: 1px solid var(--border);
  background: rgba(7,9,13,0.88);
  backdrop-filter: blur(12px);
  position: sticky; top: 0; z-index: 100;
}
.logo { font-family: 'Syne', sans-serif; font-size: 20px; font-weight: 800; letter-spacing: .18em; color: #fff; }
.logo em { color: var(--accent); font-style: normal; }
.header-right { display: flex; align-items: center; gap: 20px; }
.live-pill {
  display: flex; align-items: center; gap: 7px;
  font-size: 10px; letter-spacing: .15em; color: var(--green);
  border: 1px solid rgba(0,230,118,.25); border-radius: 20px; padding: 4px 12px;
}
.live-dot { width:7px; height:7px; border-radius:50%; background:var(--green); animation: blink 1.4s infinite; }
@keyframes blink { 0%,100%{opacity:1;box-shadow:0 0 0 0 rgba(0,230,118,.5)} 50%{opacity:.6;box-shadow:0 0 0 5px rgba(0,230,118,0)} }
#clock { font-size: 11px; color: var(--dim); letter-spacing: .12em; }

/* ── TICKER ── */
.ticker-wrap { overflow: hidden; border-bottom: 1px solid var(--border); background: var(--s1); padding: 9px 0; }
.ticker-track { display: flex; gap: 52px; animation: scroll 40s linear infinite; white-space: nowrap; }
@keyframes scroll { to { transform: translateX(-50%); } }
.t-item { display: flex; align-items: center; gap: 9px; font-size: 11px; letter-spacing: .07em; }
.t-sym { color: var(--dim); }
.t-price { color: #fff; font-weight: 700; }
.t-chg.up { color: var(--green); } .t-chg.dn { color: var(--red); }

/* ── LAYOUT ── */
main { padding: 28px 36px; display: flex; flex-direction: column; gap: 22px; }

/* ── QUOTE CARDS ── */
.quote-grid { display: grid; grid-template-columns: repeat(4,1fr); gap: 14px; }
.qcard {
  background: var(--s1); border: 1px solid var(--border); border-radius: 6px;
  padding: 20px 22px; cursor: pointer; transition: border-color .25s, box-shadow .25s;
  position: relative; overflow: hidden;
}
.qcard::before {
  content:''; position:absolute; top:0; left:0; right:0; height:2px;
  background: linear-gradient(90deg, var(--c, var(--accent)), transparent);
  opacity:0; transition: opacity .25s;
}
.qcard:hover, .qcard.active { border-color: var(--c, var(--accent)); box-shadow: 0 0 22px rgba(var(--cr,0,212,255),.13); }
.qcard:hover::before, .qcard.active::before { opacity: 1; }
.qcard-sym { font-size: 10px; letter-spacing: .2em; color: var(--dim); margin-bottom: 8px; }
.qcard-price { font-family:'Syne',sans-serif; font-size:26px; font-weight:800; color:#fff; letter-spacing:-.02em; }
.qcard-meta { display:flex; align-items:center; gap:8px; margin-top:7px; }
.pill { font-size:10px; font-weight:700; padding:2px 8px; border-radius:3px; letter-spacing:.05em; }
.pill.up { background:rgba(0,230,118,.15); color:var(--green); }
.pill.dn { background:rgba(255,23,68,.15); color:var(--red); }
.qcard-name { font-size:10px; color:var(--dim); margin-top:4px; letter-spacing:.05em; }
.qcard-spark { margin-top: 12px; height: 36px; }
.qcard-spark svg { width:100%; height:100%; }
.loading-shimmer { background: linear-gradient(90deg, var(--s2) 25%, var(--border) 50%, var(--s2) 75%); background-size:200% 100%; animation: shimmer 1.5s infinite; border-radius:4px; }
@keyframes shimmer { to{background-position:-200% 0} }

/* ── MAIN ROW ── */
.main-row { display: grid; grid-template-columns: 1fr 320px; gap: 18px; }

/* ── CHART PANEL ── */
.chart-panel {
  background: var(--s1); border: 1px solid var(--border); border-radius: 6px;
  display: flex; flex-direction: column; overflow: hidden;
}
.chart-head {
  display:flex; align-items:flex-start; justify-content:space-between;
  padding: 22px 24px 18px;
}
.chart-title-block {}
.chart-sym { font-family:'Syne',sans-serif; font-size:22px; font-weight:800; color:#fff; }
.chart-fullname { font-size:11px; color:var(--dim); margin-top:3px; letter-spacing:.07em; }
.chart-live-price { font-family:'Syne',sans-serif; font-size:28px; font-weight:800; margin-top:4px; }
.chart-controls { display:flex; flex-direction:column; align-items:flex-end; gap:8px; }
.tf-row { display:flex; gap:4px; }
.tf { background:none; border:1px solid var(--border); color:var(--dim); padding:5px 11px;
  border-radius:3px; font-family:'Space Mono',monospace; font-size:10px; cursor:pointer;
  letter-spacing:.1em; transition:all .2s; }
.tf:hover, .tf.on { border-color:var(--accent); color:var(--accent); }
.type-row { display:flex; gap:4px; }
.type-btn { background:none; border:1px solid var(--border); color:var(--dim); padding:4px 9px;
  border-radius:3px; font-family:'Space Mono',monospace; font-size:9px; cursor:pointer;
  letter-spacing:.1em; transition:all .2s; }
.type-btn:hover, .type-btn.on { border-color:var(--accent); color:var(--accent); }
#chartContainer { flex:1; min-height:280px; }
.chart-footer {
  padding:10px 24px; border-top:1px solid var(--border);
  display:flex; gap:24px; font-size:10px; color:var(--dim); letter-spacing:.08em;
}
.cf-item span { color:var(--text); margin-left:6px; }

/* ── WATCHLIST ── */
.watchlist { background:var(--s1); border:1px solid var(--border); border-radius:6px; overflow:hidden; }
.wl-head {
  padding:18px 20px; border-bottom:1px solid var(--border);
  display:flex; align-items:center; justify-content:space-between;
}
.wl-title { font-family:'Syne',sans-serif; font-size:14px; font-weight:800; color:#fff; letter-spacing:.05em; }
.wl-count { font-size:10px; color:var(--dim); background:var(--s2); border:1px solid var(--border); padding:2px 9px; border-radius:20px; }
.wl-row {
  display:flex; align-items:center; padding:13px 20px; gap:11px;
  border-bottom:1px solid rgba(26,37,53,.6); cursor:pointer; transition:background .18s;
}
.wl-row:last-child { border-bottom:none; }
.wl-row:hover { background:var(--s2); }
.wl-row.active { background:rgba(0,212,255,.05); border-left:2px solid var(--accent); }
.wl-icon { width:34px; height:34px; border-radius:7px; display:flex; align-items:center; justify-content:center;
  font-family:'Syne',sans-serif; font-size:10px; font-weight:800; flex-shrink:0; letter-spacing:.04em; }
.wl-info { flex:1; min-width:0; }
.wl-sym { font-size:12px; font-weight:700; color:#fff; letter-spacing:.06em; }
.wl-name { font-size:9px; color:var(--dim); margin-top:2px; letter-spacing:.04em; white-space:nowrap; overflow:hidden; text-overflow:ellipsis; }
.wl-spark { width:46px; height:26px; }
.wl-spark svg { width:100%; height:100%; }
.wl-nums { text-align:right; }
.wl-price { font-size:12px; font-weight:700; color:#fff; }
.wl-pct { font-size:10px; margin-top:2px; font-weight:700; }

/* ── BOTTOM ── */
.bottom-row { display:grid; grid-template-columns:1fr 1fr; gap:18px; }
.stat-card { background:var(--s1); border:1px solid var(--border); border-radius:6px; padding:22px; }
.stat-label { font-size:10px; letter-spacing:.18em; color:var(--dim); text-transform:uppercase; margin-bottom:14px; }
.stat-grid { display:grid; grid-template-columns:repeat(3,1fr); gap:10px; }
.stat-item { background:var(--s2); border:1px solid var(--border); border-radius:4px; padding:12px; }
.stat-k { font-size:9px; letter-spacing:.12em; color:var(--dim); margin-bottom:6px; }
.stat-v { font-size:14px; font-weight:700; color:#fff; font-family:'Syne',sans-serif; }

/* Heatmap */
.hm-grid { display:grid; grid-template-columns:repeat(5,1fr); gap:5px; }
.hm-cell {
  aspect-ratio:1; border-radius:4px; display:flex; flex-direction:column;
  align-items:center; justify-content:center; gap:2px;
  font-size:8px; font-weight:700; letter-spacing:.04em; cursor:pointer;
  transition:transform .2s, filter .2s;
}
.hm-cell:hover { transform:scale(1.07); filter:brightness(1.25); }
.hm-sym { font-size:9px; }
.hm-pct { font-size:8px; opacity:.85; }

/* ── TOAST ── */
#toast {
  position:fixed; bottom:24px; right:24px; background:var(--s2); border:1px solid var(--border);
  color:var(--text); font-size:11px; padding:10px 18px; border-radius:4px;
  opacity:0; transform:translateY(8px); transition:all .3s; pointer-events:none; z-index:999;
  letter-spacing:.06em;
}
#toast.show { opacity:1; transform:translateY(0); }

/* Anim */
.qcard,.chart-panel,.watchlist,.stat-card { animation:fadeUp .5s cubic-bezier(.4,0,.2,1) both; }
.qcard:nth-child(1){animation-delay:.04s} .qcard:nth-child(2){animation-delay:.09s}
.qcard:nth-child(3){animation-delay:.14s} .qcard:nth-child(4){animation-delay:.19s}
.chart-panel{animation-delay:.24s} .watchlist{animation-delay:.28s}
@keyframes fadeUp { from{opacity:0;transform:translateY(14px)} to{opacity:1;transform:translateY(0)} }

@media(max-width:1080px){.quote-grid{grid-template-columns:repeat(2,1fr)}.main-row{grid-template-columns:1fr}.bottom-row{grid-template-columns:1fr}}
@media(max-width:600px){header,main{padding:14px 16px}.quote-grid{grid-template-columns:1fr 1fr}}
</style>
</head>
<body>
<div class="z1">

<header>
  <div class="logo">MÄRK<em>T</em>E<span style="font-size:11px;font-family:'Space Mono';font-weight:400;letter-spacing:.1em;color:var(--dim);margin-left:14px;">LIVE</span></div>
  <div class="header-right">
    <div class="live-pill"><div class="live-dot"></div>ECHTZEIT</div>
    <div id="clock">--:--:--</div>
  </div>
</header>

<div class="ticker-wrap"><div class="ticker-track" id="tickerTrack">
  <div class="t-item"><span class="t-sym">···</span><span class="t-price">Lade Kurse</span></div>
</div></div>

<main>
  <div class="quote-grid" id="quoteGrid">
    ${[0,1,2,3].map(()=>`<div class="qcard"><div class="loading-shimmer" style="height:14px;width:60%;margin-bottom:12px"></div><div class="loading-shimmer" style="height:28px;width:80%"></div></div>`).join('')}
  </div>

  <div class="main-row">
    <div class="chart-panel">
      <div class="chart-head">
        <div class="chart-title-block">
          <div class="chart-sym" id="csym">—</div>
          <div class="chart-fullname" id="cfull">Wähle einen Titel</div>
          <div class="chart-live-price" id="clive" style="color:var(--accent)">—</div>
        </div>
        <div class="chart-controls">
          <div class="tf-row">
            <button class="tf on" onclick="setTF(this,'1d')">1T</button>
            <button class="tf" onclick="setTF(this,'5d')">5T</button>
            <button class="tf" onclick="setTF(this,'1mo')">1M</button>
            <button class="tf" onclick="setTF(this,'3mo')">3M</button>
            <button class="tf" onclick="setTF(this,'1y')">1J</button>
          </div>
          <div class="type-row">
            <button class="type-btn on" onclick="setChartType(this,'candle')">Kerze</button>
            <button class="type-btn" onclick="setChartType(this,'line')">Linie</button>
            <button class="type-btn" onclick="setChartType(this,'area')">Fläche</button>
          </div>
        </div>
      </div>
      <div id="chartContainer"></div>
      <div class="chart-footer" id="chartFooter">
        <div class="cf-item">OPEN<span id="cf-open">—</span></div>
        <div class="cf-item">HIGH<span id="cf-high">—</span></div>
        <div class="cf-item">LOW<span id="cf-low">—</span></div>
        <div class="cf-item">CLOSE<span id="cf-close">—</span></div>
        <div class="cf-item">VOL<span id="cf-vol">—</span></div>
      </div>
    </div>

    <div class="watchlist">
      <div class="wl-head">
        <div class="wl-title">WATCHLIST</div>
        <div class="wl-count" id="wlCount">— Titel</div>
      </div>
      <div id="wlList"></div>
    </div>
  </div>

  <div class="bottom-row">
    <div class="stat-card">
      <div class="stat-label">Kennzahlen · <span id="statSym" style="color:var(--accent)">—</span></div>
      <div class="stat-grid" id="statGrid">
        ${['52W HIGH','52W LOW','Ø VOL','KGV','BETA','MARKTK.'].map(k=>`<div class="stat-item"><div class="stat-k">${k}</div><div class="stat-v loading-shimmer" style="height:20px;width:70%"></div></div>`).join('')}
      </div>
    </div>
    <div class="stat-card">
      <div class="stat-label">Tages-Heatmap · DAX Auswahl</div>
      <div class="hm-grid" id="hmGrid"></div>
    </div>
  </div>
</main>
</div>

<div id="toast"></div>

<script>
// ── CONFIG ───────────────────────────────────────────────────────────────────
const PROXY = 'https://api.allorigins.win/get?url=';

const WATCHLIST = [
  { sym:'SAP.DE',   name:'SAP SE',          color:'#0066cc', rgb:'0,102,204' },
  { sym:'SIE.DE',   name:'Siemens AG',       color:'#00838f', rgb:'0,131,143' },
  { sym:'ALV.DE',   name:'Allianz SE',       color:'#003a70', rgb:'0,58,112' },
  { sym:'BMW.DE',   name:'BMW AG',           color:'#1c69d4', rgb:'28,105,212' },
  { sym:'DTE.DE',   name:'Deutsche Telekom', color:'#e20074', rgb:'226,0,116' },
  { sym:'MRK.DE',   name:'Merck KGaA',       color:'#009b77', rgb:'0,155,119' },
  { sym:'DBK.DE',   name:'Deutsche Bank',    color:'#006ab3', rgb:'0,106,179' },
  { sym:'BAYN.DE',  name:'Bayer AG',         color:'#10a54a', rgb:'16,165,74' },
  { sym:'^GDAXI',   name:'DAX 40',           color:'#00d4ff', rgb:'0,212,255' },
  { sym:'^STOXX50E',name:'EuroStoxx 50',     color:'#7c4dff', rgb:'124,77,255' },
];

const HM_SYMS = [
  'SAP.DE','SIE.DE','ALV.DE','BMW.DE','DTE.DE',
  'MRK.DE','DBK.DE','BAYN.DE','VOW3.DE','BAS.DE',
  'IFX.DE','ADS.DE','HEN3.DE','FRE.DE','RWE.DE',
];

let state = { sym: 'SAP.DE', tf: '1d', chartType: 'candle', quotes: {}, chart: null, series: null };

// ── CLOCK ────────────────────────────────────────────────────────────────────
setInterval(()=>{
  document.getElementById('clock').textContent =
    new Date().toLocaleTimeString('de-DE',{hour:'2-digit',minute:'2-digit',second:'2-digit'})+' MEZ';
},1000);

// ── TOAST ────────────────────────────────────────────────────────────────────
function toast(msg) {
  const el = document.getElementById('toast');
  el.textContent = msg; el.classList.add('show');
  setTimeout(()=>el.classList.remove('show'),2800);
}

// ── YAHOO FINANCE FETCH ──────────────────────────────────────────────────────
async function fetchQuote(sym) {
  try {
    const url = `https://query1.finance.yahoo.com/v8/finance/chart/${sym}?interval=1d&range=5d&includePrePost=false`;
    const r = await fetch(PROXY + encodeURIComponent(url));
    const j = await r.json();
    const data = JSON.parse(j.contents);
    const res  = data.chart.result[0];
    const meta = res.meta;
    const closes = res.indicators.quote[0].close;
    const prev = closes[closes.length-2] ?? meta.chartPreviousClose;
    const curr = meta.regularMarketPrice;
    const chg  = ((curr - prev) / prev) * 100;
    return { sym, price: curr, chg, prev, name: meta.shortName||sym, currency: meta.currency||'EUR',
             high: meta.regularMarketDayHigh, low: meta.regularMarketDayLow,
             vol: meta.regularMarketVolume, closes };
  } catch(e) { return null; }
}

async function fetchHistory(sym, range, interval) {
  try {
    const url = `https://query1.finance.yahoo.com/v8/finance/chart/${sym}?interval=${interval}&range=${range}&includePrePost=false`;
    const r   = await fetch(PROXY + encodeURIComponent(url));
    const j   = await r.json();
    const data= JSON.parse(j.contents);
    const res = data.chart.result[0];
    const ts  = res.timestamp;
    const q   = res.indicators.quote[0];
    return ts.map((t,i)=>({
      time: t,
      open:  q.open[i]  ??null,
      high:  q.high[i]  ??null,
      low:   q.low[i]   ??null,
      close: q.close[i] ??null,
      volume:q.volume[i]??0,
    })).filter(d=>d.open&&d.high&&d.low&&d.close);
  } catch(e) { return []; }
}

async function fetchKeyStats(sym) {
  try {
    const url = `https://query1.finance.yahoo.com/v11/finance/quoteSummary/${sym}?modules=summaryDetail,defaultKeyStatistics`;
    const r   = await fetch(PROXY + encodeURIComponent(url));
    const j   = await r.json();
    const data= JSON.parse(j.contents);
    const sd  = data.quoteSummary.result[0].summaryDetail;
    const ks  = data.quoteSummary.result[0].defaultKeyStatistics;
    return {
      high52: sd.fiftyTwoWeekHigh?.fmt  ?? '—',
      low52:  sd.fiftyTwoWeekLow?.fmt   ?? '—',
      avgVol: sd.averageVolume?.fmt     ?? '—',
      pe:     sd.trailingPE?.fmt        ?? '—',
      beta:   sd.beta?.fmt              ?? '—',
      mcap:   sd.marketCap?.fmt         ?? '—',
    };
  } catch(e) { return null; }
}

// ── SPARKLINE ────────────────────────────────────────────────────────────────
function spark(pts, color) {
  if (!pts||pts.length<2) return '<svg></svg>';
  const min=Math.min(...pts), max=Math.max(...pts), rng=max-min||1;
  const W=50,H=26;
  const xs=pts.map((_,i)=>(i/(pts.length-1))*W);
  const ys=pts.map(p=>H-((p-min)/rng)*(H*0.88)-H*0.06);
  const d=xs.map((x,i)=>`${i?'L':'M'}${x},${ys[i]}`).join(' ');
  return `<svg viewBox="0 0 ${W} ${H}" preserveAspectRatio="none">
    <path d="${d}" fill="none" stroke="${color}" stroke-width="1.5" stroke-linecap="round"/>
  </svg>`;
}

function sparkLarge(pts, color) {
  if (!pts||pts.length<2) return '<svg></svg>';
  const min=Math.min(...pts), max=Math.max(...pts), rng=max-min||1;
  const W=200,H=36;
  const xs=pts.map((_,i)=>(i/(pts.length-1))*W);
  const ys=pts.map(p=>H-((p-min)/rng)*(H*0.88)-H*0.06);
  const d=xs.map((x,i)=>`${i?'L':'M'}${x},${ys[i]}`).join(' ');
  return `<svg viewBox="0 0 ${W} ${H}" preserveAspectRatio="none">
    <path d="${d}" fill="none" stroke="${color}" stroke-width="1.5" stroke-linecap="round"/>
  </svg>`;
}

// ── QUOTE CARDS ──────────────────────────────────────────────────────────────
const CARD_SYMS = ['^GDAXI','^STOXX50E','SAP.DE','SIE.DE'];
const CARD_LABELS = ['DAX 40','EuroStoxx 50','SAP SE','Siemens AG'];
const CARD_COLORS = ['#00d4ff','#7c4dff','#0066cc','#00838f'];

async function buildQuoteCards() {
  const results = await Promise.all(CARD_SYMS.map(s=>fetchQuote(s)));
  const grid = document.getElementById('quoteGrid');
  grid.innerHTML = results.map((q,i)=>{
    if (!q) return `<div class="qcard" style="--c:${CARD_COLORS[i]}"><div class="qcard-sym">${CARD_LABELS[i]}</div><div style="color:var(--dim);font-size:12px">Keine Daten</div></div>`;
    const up = q.chg>=0;
    const sign = up?'+':'';
    return `<div class="qcard ${i===0?'active':''}" style="--c:${CARD_COLORS[i]}" onclick="selectSym('${CARD_SYMS[i]}','${CARD_LABELS[i]}',this)">
      <div class="qcard-sym">${CARD_LABELS[i]}</div>
      <div class="qcard-price">${q.price.toLocaleString('de-DE',{minimumFractionDigits:2,maximumFractionDigits:2})}</div>
      <div class="qcard-meta">
        <span class="pill ${up?'up':'dn'}">${sign}${q.chg.toFixed(2)}%</span>
        <span style="font-size:10px;color:var(--dim)">${sign}${(q.price-q.prev).toFixed(2)}</span>
      </div>
      <div class="qcard-name">${q.name}</div>
      <div class="qcard-spark">${sparkLarge(q.closes, up?'#00e676':'#ff1744')}</div>
    </div>`;
  }).join('');
}

// ── WATCHLIST ────────────────────────────────────────────────────────────────
async function buildWatchlist() {
  const results = await Promise.all(WATCHLIST.map(w=>fetchQuote(w.sym)));
  WATCHLIST.forEach((w,i)=>{ if(results[i]) state.quotes[w.sym]=results[i]; });
  const list = document.getElementById('wlList');
  list.innerHTML = WATCHLIST.map((w,i)=>{
    const q = results[i];
    if (!q) return `<div class="wl-row"><div class="wl-info"><div class="wl-sym">${w.sym}</div><div class="wl-name">—</div></div></div>`;
    const up=q.chg>=0, sign=up?'+':'';
    const initials=w.sym.replace('.DE','').replace('^','').slice(0,4);
    return `<div class="wl-row ${w.sym===state.sym?'active':''}" onclick="selectSym('${w.sym}','${q.name||w.name}',null)">
      <div class="wl-icon" style="background:${w.color}22;color:${w.color};border:1px solid ${w.color}44">${initials}</div>
      <div class="wl-info">
        <div class="wl-sym">${w.sym.replace('.DE','').replace('^','')}</div>
        <div class="wl-name">${q.name||w.name}</div>
      </div>
      <div class="wl-spark">${spark(q.closes, up?'#00e676':'#ff1744')}</div>
      <div class="wl-nums">
        <div class="wl-price">${q.price.toLocaleString('de-DE',{minimumFractionDigits:2,maximumFractionDigits:2})}</div>
        <div class="wl-pct ${up?'up':'dn'}">${sign}${q.chg.toFixed(2)}%</div>
      </div>
    </div>`;
  }).join('');
  document.getElementById('wlCount').textContent = WATCHLIST.length+' Titel';
  buildTicker(results);
}

// ── TICKER ───────────────────────────────────────────────────────────────────
function buildTicker(results) {
  const items = [...WATCHLIST,...WATCHLIST].map((w,i)=>{
    const q = results[i % WATCHLIST.length];
    if (!q) return '';
    const up=q.chg>=0, sign=up?'+':'';
    const sym=w.sym.replace('.DE','').replace('^','');
    return `<div class="t-item"><span class="t-sym">${sym}</span><span class="t-price">${q.price.toLocaleString('de-DE',{minimumFractionDigits:2,maximumFractionDigits:2})}</span><span class="t-chg ${up?'up':'dn'}">${sign}${q.chg.toFixed(2)}%</span></div>`;
  }).join('');
  document.getElementById('tickerTrack').innerHTML = items;
}

// ── CHART ────────────────────────────────────────────────────────────────────
function initChart() {
  const container = document.getElementById('chartContainer');
  container.innerHTML = '';
  if (state.chart) { try { state.chart.remove(); } catch(e){} }

  state.chart = LightweightCharts.createChart(container, {
    layout: { background: { color: '#0c1018' }, textColor: '#506070' },
    grid: { vertLines: { color: '#1a2535' }, horzLines: { color: '#1a2535' } },
    crosshair: { mode: LightweightCharts.CrosshairMode.Normal,
      vertLine: { color: '#00d4ff', width: 1, style: 3, labelBackgroundColor: '#111720' },
      horzLine: { color: '#00d4ff', width: 1, style: 3, labelBackgroundColor: '#111720' } },
    rightPriceScale: { borderColor: '#1a2535', scaleMargins: { top:.08, bottom:.08 } },
    timeScale: { borderColor: '#1a2535', timeVisible: true, secondsVisible: false },
    handleScroll: true, handleScale: true,
  });

  state.chart.subscribeCrosshairMove(param => {
    if (!param.point) return;
    const d = param.seriesData.get(state.series);
    if (!d) return;
    if (state.chartType === 'candle') {
      document.getElementById('cf-open').textContent  = ' '+d.open?.toFixed(2);
      document.getElementById('cf-high').textContent  = ' '+d.high?.toFixed(2);
      document.getElementById('cf-low').textContent   = ' '+d.low?.toFixed(2);
      document.getElementById('cf-close').textContent = ' '+d.close?.toFixed(2);
    } else {
      document.getElementById('cf-close').textContent = ' '+(d.value??d.close)?.toFixed(2);
    }
  });
}

async function loadChart() {
  const tfMap = {
    '1d':'5m','5d':'15m','1mo':'1h','3mo':'1d','1y':'1d'
  };
  const rangeMap = {
    '1d':'1d','5d':'5d','1mo':'1mo','3mo':'3mo','1y':'1y'
  };
  const interval = tfMap[state.tf];
  const range    = rangeMap[state.tf];

  const q = state.quotes[state.sym];
  if (q) {
    document.getElementById('csym').textContent   = state.sym.replace('.DE','').replace('^','');
    document.getElementById('cfull').textContent  = q.name;
    const up = q.chg>=0;
    const liveEl = document.getElementById('clive');
    liveEl.textContent = q.price.toLocaleString('de-DE',{minimumFractionDigits:2,maximumFractionDigits:2})+' '+(q.currency||'EUR')+' ('+(q.chg>=0?'+':'')+q.chg.toFixed(2)+'%)';
    liveEl.style.color = up ? 'var(--green)' : 'var(--red)';
    document.getElementById('cf-high').nextElementSibling;
    document.getElementById('cf-open').textContent  = '';
    document.getElementById('cf-high').textContent  = ' '+(q.high?.toFixed(2)??'—');
    document.getElementById('cf-low').textContent   = ' '+(q.low?.toFixed(2)??'—');
    document.getElementById('cf-close').textContent = ' '+q.price.toFixed(2);
    document.getElementById('cf-vol').textContent   = ' '+(q.vol ? (q.vol/1e6).toFixed(1)+'M' : '—');
  }

  const bars = await fetchHistory(state.sym, range, interval);
  if (!bars.length) { toast('⚠ Keine Historien-Daten verfügbar'); return; }

  initChart();

  if (state.chartType === 'candle') {
    state.series = state.chart.addCandlestickSeries({
      upColor:'#00e676', downColor:'#ff1744',
      borderUpColor:'#00e676', borderDownColor:'#ff1744',
      wickUpColor:'#00e676', wickDownColor:'#ff1744',
    });
    state.series.setData(bars.map(d=>({ time:d.time, open:d.open, high:d.high, low:d.low, close:d.close })));

  } else if (state.chartType === 'line') {
    state.series = state.chart.addLineSeries({ color:'#00d4ff', lineWidth:2, crosshairMarkerRadius:4 });
    state.series.setData(bars.map(d=>({ time:d.time, value:d.close })));

  } else {
    state.series = state.chart.addAreaSeries({
      lineColor:'#00d4ff', topColor:'rgba(0,212,255,0.28)', bottomColor:'rgba(0,212,255,0.0)', lineWidth:2,
    });
    state.series.setData(bars.map(d=>({ time:d.time, value:d.close })));
  }

  state.chart.timeScale().fitContent();
}

// ── KEY STATS ────────────────────────────────────────────────────────────────
async function buildStats(sym) {
  document.getElementById('statSym').textContent = sym.replace('.DE','').replace('^','');
  const ks = await fetchKeyStats(sym);
  if (!ks) return;
  const labels = ['52W HIGH','52W LOW','Ø VOL','KGV','BETA','MARKTK.'];
  const vals   = [ks.high52, ks.low52, ks.avgVol, ks.pe, ks.beta, ks.mcap];
  document.getElementById('statGrid').innerHTML = labels.map((l,i)=>`
    <div class="stat-item">
      <div class="stat-k">${l}</div>
      <div class="stat-v">${vals[i]}</div>
    </div>`).join('');
}

// ── HEATMAP ──────────────────────────────────────────────────────────────────
async function buildHeatmap() {
  const results = await Promise.all(HM_SYMS.map(s=>fetchQuote(s)));
  document.getElementById('hmGrid').innerHTML = results.map((q,i)=>{
    const sym = HM_SYMS[i].replace('.DE','');
    if (!q) return `<div class="hm-cell" style="background:var(--s2);color:var(--dim)"><div class="hm-sym">${sym}</div><div class="hm-pct">—</div></div>`;
    const up=q.chg>=0, int=Math.min(Math.abs(q.chg)/5,1);
    const bg=up?`rgba(0,230,118,${.15+int*.5})`:`rgba(255,23,68,${.15+int*.5})`;
    const col=up?'#00e676':'#ff1744';
    return `<div class="hm-cell" style="background:${bg};color:${col}" title="${sym}: ${q.chg>=0?'+':''}${q.chg.toFixed(2)}%" onclick="selectSym('${HM_SYMS[i]}','${q.name||sym}',null)">
      <div class="hm-sym">${sym}</div>
      <div class="hm-pct">${q.chg>=0?'+':''}${q.chg.toFixed(1)}%</div>
    </div>`;
  }).join('');
}

// ── SELECT SYM ───────────────────────────────────────────────────────────────
async function selectSym(sym, name, cardEl) {
  state.sym = sym;
  // active on cards
  document.querySelectorAll('.qcard').forEach(c=>c.classList.remove('active'));
  if (cardEl) cardEl.classList.add('active');
  // active on wl
  document.querySelectorAll('.wl-row').forEach(r=>r.classList.remove('active'));
  document.querySelectorAll('.wl-row').forEach(r=>{
    if (r.onclick?.toString().includes(sym)) r.classList.add('active');
  });

  if (!state.quotes[sym]) {
    const q = await fetchQuote(sym);
    if (q) state.quotes[sym] = q;
  }
  await loadChart();
  buildStats(sym);
}

function setTF(btn, tf) {
  document.querySelectorAll('.tf').forEach(b=>b.classList.remove('on'));
  btn.classList.add('on');
  state.tf = tf;
  loadChart();
}

function setChartType(btn, type) {
  document.querySelectorAll('.type-btn').forEach(b=>b.classList.remove('on'));
  btn.classList.add('on');
  state.chartType = type;
  loadChart();
}

// ── INIT ─────────────────────────────────────────────────────────────────────
async function init() {
  toast('⬇ Lade Live-Daten von Yahoo Finance…');
  initChart();
  await Promise.all([
    buildQuoteCards(),
    buildWatchlist(),
    buildHeatmap(),
  ]);
  await selectSym(state.sym, 'SAP SE', null);
  toast('✓ Live-Daten geladen');

  // Auto-refresh every 60s
  setInterval(async () => {
    await buildWatchlist();
    await loadChart();
    toast('↻ Kurse aktualisiert');
  }, 60000);
}

init();
</script>
